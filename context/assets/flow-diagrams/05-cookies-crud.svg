<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 520" font-family="Segoe UI, Arial, sans-serif">
  <rect width="1100" height="520" fill="#101826"/>
  <text x="550" y="42" text-anchor="middle" fill="#ffffff" font-size="26" font-weight="700">Cookies CRUD Flow</text>
  <text x="550" y="66" text-anchor="middle" fill="#8ea0b8" font-size="13">Read, set, refresh cycle across UI, Host, and Agent</text>

  <rect x="60" y="110" width="210" height="70" rx="8" fill="#24203a" stroke="#8f7bff"/>
  <text x="165" y="140" text-anchor="middle" fill="#c7bbff" font-size="14" font-weight="600">UI useCookies</text>
  <text x="165" y="160" text-anchor="middle" fill="#9ba8ba" font-size="11">getCookies / setCookie</text>

  <rect x="445" y="110" width="210" height="70" rx="8" fill="#162c2a" stroke="#46d4c8"/>
  <text x="550" y="140" text-anchor="middle" fill="#8ff2ea" font-size="14" font-weight="600">Extension Host</text>
  <text x="550" y="160" text-anchor="middle" fill="#9ba8ba" font-size="11">host:get-cookies / host:set-cookie</text>

  <rect x="830" y="110" width="210" height="70" rx="8" fill="#2e1f1f" stroke="#ff7d7d"/>
  <text x="935" y="140" text-anchor="middle" fill="#ffb0b0" font-size="14" font-weight="600">Browser Agent</text>
  <text x="935" y="160" text-anchor="middle" fill="#9ba8ba" font-size="11">document.cookie read/write</text>

  <line x1="270" y1="145" x2="445" y2="145" stroke="#7fc7ff" stroke-width="2"/>
  <polygon points="445,145 434,139 434,151" fill="#7fc7ff"/>
  <text x="355" y="134" text-anchor="middle" fill="#7fc7ff" font-size="10">viewer:command</text>

  <line x1="655" y1="145" x2="830" y2="145" stroke="#7fc7ff" stroke-width="2"/>
  <polygon points="830,145 819,139 819,151" fill="#7fc7ff"/>
  <text x="742" y="134" text-anchor="middle" fill="#7fc7ff" font-size="10">WebSocket</text>

  <line x1="830" y1="250" x2="655" y2="250" stroke="#ffb36b" stroke-width="2"/>
  <polygon points="655,250 666,244 666,256" fill="#ffb36b"/>
  <text x="742" y="238" text-anchor="middle" fill="#ffb36b" font-size="10">agent:cookies-data</text>

  <line x1="445" y1="250" x2="270" y2="250" stroke="#ffb36b" stroke-width="2"/>
  <polygon points="270,250 281,244 281,256" fill="#ffb36b"/>
  <text x="355" y="238" text-anchor="middle" fill="#ffb36b" font-size="10">extension:cookies-data</text>

  <rect x="90" y="300" width="920" height="170" rx="10" fill="#0d1422" stroke="#33455f"/>
  <text x="120" y="332" fill="#9fb2ca" font-size="13" font-weight="600">Sequence</text>
  <text x="120" y="360" fill="#9fb2ca" font-size="12">1. UI requests cookies list from Host.</text>
  <text x="120" y="384" fill="#9fb2ca" font-size="12">2. Host asks Agent at app origin to read document.cookie.</text>
  <text x="120" y="408" fill="#9fb2ca" font-size="12">3. Agent returns serialized cookies; UI parses and renders.</text>
  <text x="120" y="432" fill="#9fb2ca" font-size="12">4. On setCookie, Agent writes with path/max-age, emits refreshed list.</text>
  <text x="120" y="456" fill="#9fb2ca" font-size="12">5. UI reloads preview iframe and refreshes list after short delay.</text>
</svg>
