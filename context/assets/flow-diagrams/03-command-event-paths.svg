<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 550" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bgGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1419"/>
      <stop offset="100%" style="stop-color:#1a2332"/>
    </linearGradient>
    <filter id="shadow3">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-opacity="0.2"/>
    </filter>
    <marker id="arrowRight" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00cec9"/>
    </marker>
    <marker id="arrowLeft" markerWidth="10" markerHeight="7" refX="1" refY="3.5" orient="auto">
      <polygon points="10 0, 0 3.5, 10 7" fill="#ff9f7f"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a29bfe"/>
    </marker>
  </defs>

  <rect width="1200" height="550" fill="url(#bgGrad3)" rx="12"/>

  <!-- Title -->
  <text x="600" y="40" text-anchor="middle" fill="#ffffff" font-size="22" font-weight="700">Command &amp; Event Paths</text>
  <text x="600" y="62" text-anchor="middle" fill="#8899aa" font-size="12">Bidirectional message routing between UI, Host, and Agent</text>

  <!-- === COMMAND PATH (Top) === -->
  <rect x="40" y="85" width="1120" height="190" rx="10" fill="#0d1a25" stroke="#00cec9" stroke-width="0.8"/>
  <text x="60" y="108" fill="#00cec9" font-size="14" font-weight="700">▶ COMMAND PATH</text>
  <text x="200" y="108" fill="#667788" font-size="11">(UI → Agent) — User actions dispatched to browser</text>

  <!-- UI Layer -->
  <rect x="70" y="125" width="160" height="70" rx="8" fill="#1a1530" stroke="#a29bfe" stroke-width="1.2" filter="url(#shadow3)"/>
  <text x="150" y="152" text-anchor="middle" fill="#c4b5fd" font-size="12" font-weight="600">React Panel</text>
  <text x="150" y="170" text-anchor="middle" fill="#8899aa" font-size="9">onClick / user action</text>
  <text x="150" y="184" text-anchor="middle" fill="#667788" font-size="8">window.__wci_cmd()</text>

  <!-- Arrow 1 -->
  <line x1="230" y1="160" x2="270" y2="160" stroke="#a29bfe" stroke-width="2" marker-end="url(#arrowPurple)"/>

  <!-- IIFE Bridge -->
  <rect x="275" y="125" width="160" height="70" rx="8" fill="#1a1530" stroke="#a29bfe" stroke-width="1.2" filter="url(#shadow3)"/>
  <text x="355" y="152" text-anchor="middle" fill="#c4b5fd" font-size="12" font-weight="600">IIFE Bridge</text>
  <text x="355" y="170" text-anchor="middle" fill="#8899aa" font-size="9">websocket.ts</text>
  <text x="355" y="184" text-anchor="middle" fill="#667788" font-size="8">viewer:command {cmd, args}</text>

  <!-- Arrow 2 -->
  <line x1="435" y1="160" x2="475" y2="160" stroke="#00cec9" stroke-width="2" marker-end="url(#arrowRight)"/>
  <rect x="440" y="145" width="32" height="14" rx="3" fill="#0d2d2d"/>
  <text x="456" y="155" text-anchor="middle" fill="#00cec9" font-size="7">WS</text>

  <!-- Command Handler -->
  <rect x="480" y="125" width="180" height="70" rx="8" fill="#0d2520" stroke="#4ecdc4" stroke-width="1.2" filter="url(#shadow3)"/>
  <text x="570" y="152" text-anchor="middle" fill="#7ae5dc" font-size="12" font-weight="600">Command Handler</text>
  <text x="570" y="170" text-anchor="middle" fill="#8899aa" font-size="9">handleWebviewCommand</text>
  <text x="570" y="184" text-anchor="middle" fill="#667788" font-size="8">dispatch + validate</text>

  <!-- Arrow 3 -->
  <line x1="660" y1="160" x2="700" y2="160" stroke="#00cec9" stroke-width="2" marker-end="url(#arrowRight)"/>

  <!-- WS Server -->
  <rect x="705" y="125" width="160" height="70" rx="8" fill="#0d2520" stroke="#4ecdc4" stroke-width="1.2" filter="url(#shadow3)"/>
  <text x="785" y="152" text-anchor="middle" fill="#7ae5dc" font-size="12" font-weight="600">WS Server</text>
  <text x="785" y="170" text-anchor="middle" fill="#8899aa" font-size="9">wsServer.send()</text>
  <text x="785" y="184" text-anchor="middle" fill="#667788" font-size="8">→ iframe clients</text>

  <!-- Arrow 4 -->
  <line x1="865" y1="160" x2="905" y2="160" stroke="#00cec9" stroke-width="2" marker-end="url(#arrowRight)"/>
  <rect x="870" y="145" width="32" height="14" rx="3" fill="#0d2d2d"/>
  <text x="886" y="155" text-anchor="middle" fill="#00cec9" font-size="7">WS</text>

  <!-- Agent -->
  <rect x="910" y="125" width="220" height="70" rx="8" fill="#2d1a1a" stroke="#ff6b6b" stroke-width="1.2" filter="url(#shadow3)"/>
  <text x="1020" y="152" text-anchor="middle" fill="#ff9f7f" font-size="12" font-weight="600">Browser Agent</text>
  <text x="1020" y="170" text-anchor="middle" fill="#8899aa" font-size="9">handleHostMessage()</text>
  <text x="1020" y="184" text-anchor="middle" fill="#667788" font-size="8">execute action in DOM</text>

  <!-- Flow summary -->
  <rect x="70" y="215" width="1060" height="35" rx="5" fill="#0a1520" stroke="#334455" stroke-width="0.5"/>
  <text x="600" y="237" text-anchor="middle" fill="#556677" font-size="10">Examples: selectComponent, highlightComponent, getCookies, setCookie, networkPause, performanceStart, startDebug</text>

  <!-- === EVENT PATH (Bottom) === -->
  <rect x="40" y="290" width="1120" height="190" rx="10" fill="#0d1a25" stroke="#ff9f7f" stroke-width="0.8"/>
  <text x="60" y="313" fill="#ff9f7f" font-size="14" font-weight="700">◀ EVENT PATH</text>
  <text x="190" y="313" fill="#667788" font-size="11">(Agent → UI) — Browser events relayed to DevTools</text>

  <!-- Agent -->
  <rect x="70" y="330" width="200" height="70" rx="8" fill="#2d1a1a" stroke="#ff6b6b" stroke-width="1.2" filter="url(#shadow3)"/>
  <text x="170" y="357" text-anchor="middle" fill="#ff9f7f" font-size="12" font-weight="600">Browser Agent</text>
  <text x="170" y="375" text-anchor="middle" fill="#8899aa" font-size="9">sendMessage()</text>
  <text x="170" y="389" text-anchor="middle" fill="#667788" font-size="8">agent:* messages</text>

  <!-- Arrow 1 -->
  <line x1="270" y1="365" x2="310" y2="365" stroke="#ff9f7f" stroke-width="2" marker-end="url(#arrowRight)"/>
  <rect x="275" y="350" width="32" height="14" rx="3" fill="#2d1a1a"/>
  <text x="291" y="360" text-anchor="middle" fill="#ff9f7f" font-size="7">WS</text>

  <!-- Message Router -->
  <rect x="315" y="330" width="180" height="70" rx="8" fill="#0d2520" stroke="#4ecdc4" stroke-width="1.2" filter="url(#shadow3)"/>
  <text x="405" y="357" text-anchor="middle" fill="#7ae5dc" font-size="12" font-weight="600">Message Router</text>
  <text x="405" y="375" text-anchor="middle" fill="#8899aa" font-size="9">handleAgentMessage</text>
  <text x="405" y="389" text-anchor="middle" fill="#667788" font-size="8">emit + transform</text>

  <!-- Arrow 2 -->
  <line x1="495" y1="365" x2="535" y2="365" stroke="#4ecdc4" stroke-width="2" marker-end="url(#arrowRight)"/>

  <!-- WS Relay -->
  <rect x="540" y="330" width="160" height="70" rx="8" fill="#0d2520" stroke="#4ecdc4" stroke-width="1.2" filter="url(#shadow3)"/>
  <text x="620" y="357" text-anchor="middle" fill="#7ae5dc" font-size="12" font-weight="600">sendToViewers</text>
  <text x="620" y="375" text-anchor="middle" fill="#8899aa" font-size="9">extension:* events</text>
  <text x="620" y="389" text-anchor="middle" fill="#667788" font-size="8">broadcast to viewers</text>

  <!-- Arrow 3 -->
  <line x1="700" y1="365" x2="740" y2="365" stroke="#a29bfe" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <rect x="705" y="350" width="32" height="14" rx="3" fill="#1a1530"/>
  <text x="721" y="360" text-anchor="middle" fill="#a29bfe" font-size="7">WS</text>

  <!-- IIFE Bridge -->
  <rect x="745" y="330" width="160" height="70" rx="8" fill="#1a1530" stroke="#a29bfe" stroke-width="1.2" filter="url(#shadow3)"/>
  <text x="825" y="357" text-anchor="middle" fill="#c4b5fd" font-size="12" font-weight="600">IIFE Bridge</text>
  <text x="825" y="375" text-anchor="middle" fill="#8899aa" font-size="9">dispatch CustomEvent</text>
  <text x="825" y="389" text-anchor="middle" fill="#667788" font-size="8">wci:* events</text>

  <!-- Arrow 4 -->
  <line x1="905" y1="365" x2="945" y2="365" stroke="#a29bfe" stroke-width="2" marker-end="url(#arrowPurple)"/>

  <!-- React -->
  <rect x="950" y="330" width="180" height="70" rx="8" fill="#1a1530" stroke="#a29bfe" stroke-width="1.2" filter="url(#shadow3)"/>
  <text x="1040" y="357" text-anchor="middle" fill="#c4b5fd" font-size="12" font-weight="600">React Hook</text>
  <text x="1040" y="375" text-anchor="middle" fill="#8899aa" font-size="9">useEffect listener</text>
  <text x="1040" y="389" text-anchor="middle" fill="#667788" font-size="8">setState → re-render</text>

  <!-- Flow summary -->
  <rect x="70" y="420" width="1060" height="35" rx="5" fill="#0a1520" stroke="#334455" stroke-width="0.5"/>
  <text x="600" y="442" text-anchor="middle" fill="#556677" font-size="10">Examples: tree-update, component-selected, cookies-data, console, network-entry, performance, coverage-data, a11y-report</text>

  <!-- Bottom key insight -->
  <rect x="40" y="500" width="1120" height="35" rx="6" fill="#162029" stroke="#445566" stroke-width="0.8"/>
  <text x="600" y="522" text-anchor="middle" fill="#8899aa" font-size="11">💡 All messages pass through WebSocket Server (single transport) — IIFE bridge converts WS frames to DOM CustomEvents for React consumption</text>
</svg>