<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1419"/>
      <stop offset="100%" style="stop-color:#1a2332"/>
    </linearGradient>
    <linearGradient id="stepGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00b894"/>
      <stop offset="100%" style="stop-color:#00cec9"/>
    </linearGradient>
    <filter id="shadow2">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="1200" height="750" fill="url(#bgGrad2)" rx="12"/>

  <!-- Title -->
  <text x="600" y="42" text-anchor="middle" fill="#ffffff" font-size="22" font-weight="700">Startup &amp; Agent Injection Flow</text>
  <text x="600" y="64" text-anchor="middle" fill="#8899aa" font-size="12">Sequential boot process from user command to live agent connection</text>

  <!-- Timeline line -->
  <line x1="100" y1="110" x2="100" y2="700" stroke="#334455" stroke-width="2"/>

  <!-- Step 1 -->
  <circle cx="100" cy="130" r="16" fill="#00b894" filter="url(#shadow2)"/>
  <text x="100" y="135" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">1</text>
  <rect x="135" y="112" width="1020" height="65" rx="8" fill="#162029" stroke="#00b894" stroke-width="1" filter="url(#shadow2)"/>
  <text x="155" y="135" fill="#00e6a0" font-size="13" font-weight="600">User runs wci.run command</text>
  <text x="155" y="155" fill="#8899aa" font-size="11">Extension activates → starts dev server on random internal port → initializes proxy</text>
  <rect x="850" y="122" width="120" height="28" rx="4" fill="#0d3d30"/>
  <text x="910" y="140" text-anchor="middle" fill="#00e6a0" font-size="10">👤 User Action</text>
  <rect x="980" y="122" width="155" height="28" rx="4" fill="#1a2d3d"/>
  <text x="1057" y="140" text-anchor="middle" fill="#4ecdc4" font-size="10">⚡ Extension Host</text>

  <!-- Step 2 -->
  <circle cx="100" cy="210" r="16" fill="#00b894" filter="url(#shadow2)"/>
  <text x="100" y="215" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">2</text>
  <rect x="135" y="192" width="1020" height="80" rx="8" fill="#162029" stroke="#00b894" stroke-width="1" filter="url(#shadow2)"/>
  <text x="155" y="215" fill="#00e6a0" font-size="13" font-weight="600">AgentInjector Proxy starts</text>
  <text x="155" y="235" fill="#8899aa" font-size="11">Proxy binds upstream dev server, configures WS port, agent.js path</text>
  <text x="155" y="255" fill="#667788" font-size="10">• Opens DevTools URL at proxyPort/__devtools__  • Serves agent.js with port globals baked in</text>

  <!-- Proxy diagram -->
  <rect x="750" y="205" width="90" height="34" rx="6" fill="#0d2d2d" stroke="#4ecdc4" stroke-width="1"/>
  <text x="795" y="226" text-anchor="middle" fill="#4ecdc4" font-size="10">Dev Server</text>
  <path d="M 840 222 L 870 222" stroke="#4ecdc4" stroke-width="1.5"/>
  <text x="880" y="226" fill="#4ecdc4" font-size="10">→</text>
  <rect x="890" y="205" width="70" height="34" rx="6" fill="#0d2d2d" stroke="#ff6b6b" stroke-width="1"/>
  <text x="925" y="226" text-anchor="middle" fill="#ff9f7f" font-size="10">Proxy</text>
  <path d="M 960 222 L 990 222" stroke="#ff9f7f" stroke-width="1.5"/>
  <text x="1000" y="226" fill="#ff9f7f" font-size="10">→</text>
  <rect x="1010" y="205" width="75" height="34" rx="6" fill="#0d2d2d" stroke="#a29bfe" stroke-width="1"/>
  <text x="1047" y="226" text-anchor="middle" fill="#c4b5fd" font-size="10">Browser</text>

  <!-- Step 3 -->
  <circle cx="100" cy="310" r="16" fill="#00b894" filter="url(#shadow2)"/>
  <text x="100" y="315" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">3</text>
  <rect x="135" y="292" width="1020" height="80" rx="8" fill="#162029" stroke="#00b894" stroke-width="1" filter="url(#shadow2)"/>
  <text x="155" y="315" fill="#00e6a0" font-size="13" font-weight="600">Browser requests app page via proxy</text>
  <text x="155" y="335" fill="#8899aa" font-size="11">Proxy forwards to dev server → receives HTML → performs injection transformations:</text>
  
  <!-- Injection steps -->
  <rect x="170" y="345" width="200" height="22" rx="4" fill="#1a1525" stroke="#a29bfe" stroke-width="0.5"/>
  <text x="270" y="360" text-anchor="middle" fill="#c4b5fd" font-size="9">① Inject &lt;head&gt; hook patch</text>
  <rect x="385" y="345" width="200" height="22" rx="4" fill="#1a1525" stroke="#a29bfe" stroke-width="0.5"/>
  <text x="485" y="360" text-anchor="middle" fill="#c4b5fd" font-size="9">② Add agent &lt;script&gt; tag</text>
  <rect x="600" y="345" width="200" height="22" rx="4" fill="#1a1525" stroke="#a29bfe" stroke-width="0.5"/>
  <text x="700" y="360" text-anchor="middle" fill="#c4b5fd" font-size="9">③ Relax CSP headers</text>
  <rect x="815" y="345" width="200" height="22" rx="4" fill="#1a1525" stroke="#a29bfe" stroke-width="0.5"/>
  <text x="915" y="360" text-anchor="middle" fill="#c4b5fd" font-size="9">④ Strip X-Frame-Options</text>

  <!-- Step 4 -->
  <circle cx="100" cy="410" r="16" fill="#00b894" filter="url(#shadow2)"/>
  <text x="100" y="415" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">4</text>
  <rect x="135" y="392" width="1020" height="65" rx="8" fill="#162029" stroke="#00b894" stroke-width="1" filter="url(#shadow2)"/>
  <text x="155" y="415" fill="#00e6a0" font-size="13" font-weight="600">Agent loads &amp; initializes</text>
  <text x="155" y="435" fill="#8899aa" font-size="11">Browser fetches /agent.js → Agent guards via __WCI_AGENT_ACTIVE__ flag → establishes WebSocket</text>
  
  <rect x="800" y="402" width="155" height="28" rx="4" fill="#2d1a1a"/>
  <text x="877" y="420" text-anchor="middle" fill="#ff9f7f" font-size="10">🔌 WS Connect (role: iframe)</text>

  <!-- Step 5 -->
  <circle cx="100" cy="500" r="16" fill="#00b894" filter="url(#shadow2)"/>
  <text x="100" y="505" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">5</text>
  <rect x="135" y="482" width="1020" height="65" rx="8" fill="#162029" stroke="#00b894" stroke-width="1" filter="url(#shadow2)"/>
  <text x="155" y="505" fill="#00e6a0" font-size="13" font-weight="600">Agent handshake &amp; initial data</text>
  <text x="155" y="525" fill="#8899aa" font-size="11">Sends framework detection, current URL, component count → immediately followed by first tree update</text>

  <!-- Messages -->
  <rect x="700" y="490" width="200" height="22" rx="4" fill="#2d1a1a" stroke="#ff6b6b" stroke-width="0.5"/>
  <text x="800" y="505" text-anchor="middle" fill="#ff9f7f" font-size="9">agent:handshake {framework, url, count}</text>
  <rect x="700" y="518" width="200" height="22" rx="4" fill="#2d1a1a" stroke="#ff6b6b" stroke-width="0.5"/>
  <text x="800" y="533" text-anchor="middle" fill="#ff9f7f" font-size="9">agent:tree-update {tree}</text>

  <!-- Step 6 -->
  <circle cx="100" cy="590" r="16" fill="#00b894" filter="url(#shadow2)"/>
  <text x="100" y="595" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">6</text>
  <rect x="135" y="572" width="1020" height="65" rx="8" fill="#162029" stroke="#00b894" stroke-width="1" filter="url(#shadow2)"/>
  <text x="155" y="595" fill="#00e6a0" font-size="13" font-weight="600">System ready — bidirectional communication active</text>
  <text x="155" y="615" fill="#8899aa" font-size="11">Tree populates sidebar + DevTools UI • All intercepts (network, console, perf) active • Commands flow both ways</text>

  <rect x="800" y="582" width="140" height="28" rx="14" fill="#0d3d30" stroke="#00e6a0" stroke-width="1"/>
  <text x="870" y="600" text-anchor="middle" fill="#00e6a0" font-size="11" font-weight="600">✓ LIVE</text>

  <!-- Bottom summary -->
  <rect x="135" y="660" width="1020" height="55" rx="8" fill="#0d1a25" stroke="#334455" stroke-width="0.8"/>
  <text x="155" y="683" fill="#667788" font-size="11" font-weight="600">Key Design Decisions:</text>
  <text x="155" y="700" fill="#556677" font-size="10">• Proxy injection avoids requiring app code changes  • Guard flag prevents double-init  • WS role separation (iframe vs viewer) enables multi-client</text>
</svg>