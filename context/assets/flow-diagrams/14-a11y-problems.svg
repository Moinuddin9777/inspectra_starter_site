<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 560" font-family="Segoe UI, Arial, sans-serif">
  <rect width="1100" height="560" fill="#101826"/>
  <text x="550" y="42" text-anchor="middle" fill="#ffffff" font-size="26" font-weight="700">Accessibility Audit and Problems Integration</text>
  <text x="550" y="66" text-anchor="middle" fill="#8ea0b8" font-size="13">Agent checks -> Host diagnostics -> UI score and issue panels</text>

  <rect x="70" y="110" width="220" height="80" rx="8" fill="#24203a" stroke="#8f7bff"/>
  <text x="180" y="140" text-anchor="middle" fill="#c7bbff" font-size="14" font-weight="600">A11y Toolbar UI</text>
  <text x="180" y="160" text-anchor="middle" fill="#9ba8ba" font-size="11">requestA11yReport</text>
  <text x="180" y="176" text-anchor="middle" fill="#9ba8ba" font-size="11">host:request-a11y-report</text>

  <rect x="430" y="110" width="220" height="80" rx="8" fill="#162c2a" stroke="#46d4c8"/>
  <text x="540" y="140" text-anchor="middle" fill="#8ff2ea" font-size="14" font-weight="600">Extension Host</text>
  <text x="540" y="160" text-anchor="middle" fill="#9ba8ba" font-size="11">dispatch + diagnostics bridge</text>
  <text x="540" y="176" text-anchor="middle" fill="#9ba8ba" font-size="11">set VS Code diagnostics</text>

  <rect x="790" y="100" width="250" height="100" rx="8" fill="#2e1f1f" stroke="#ff7d7d"/>
  <text x="915" y="135" text-anchor="middle" fill="#ffb0b0" font-size="14" font-weight="700">Agent a11y.ts</text>
  <text x="915" y="157" text-anchor="middle" fill="#9ba8ba" font-size="11">resetA11yState + checkDocumentA11y</text>
  <text x="915" y="175" text-anchor="middle" fill="#9ba8ba" font-size="11">per-element checkA11y</text>

  <line x1="290" y1="150" x2="430" y2="150" stroke="#7fc7ff" stroke-width="2"/><polygon points="430,150 419,144 419,156" fill="#7fc7ff"/>
  <line x1="650" y1="150" x2="790" y2="150" stroke="#7fc7ff" stroke-width="2"/><polygon points="790,150 779,144 779,156" fill="#7fc7ff"/>

  <rect x="90" y="250" width="920" height="220" rx="10" fill="#0d1422" stroke="#33455f"/>
  <text x="120" y="282" fill="#9fb2ca" font-size="14" font-weight="600">Report routing</text>
  <text x="120" y="310" fill="#9fb2ca" font-size="12">1. Agent emits agent:a11y-report with issues, nodeId, source references.</text>
  <text x="120" y="336" fill="#9fb2ca" font-size="12">2. Host maps source-backed issues into VS Code Problems diagnostics.</text>
  <text x="120" y="362" fill="#9fb2ca" font-size="12">3. Host also broadcasts extension:a11y-report and wci:a11y-report.</text>
  <text x="120" y="388" fill="#9fb2ca" font-size="12">4. UI updates score badges, issue list, and component-specific indicators.</text>
  <text x="120" y="414" fill="#9fb2ca" font-size="12">5. Document-wide issues without source location are shown in UI only.</text>

  <rect x="120" y="435" width="860" height="24" rx="5" fill="#2c2a18" stroke="#e5c15b"/>
  <text x="550" y="452" text-anchor="middle" fill="#ffe08c" font-size="11">Problems panel remains source-file centric; non-file diagnostics are intentionally excluded.</text>

  <rect x="70" y="490" width="960" height="50" rx="8" fill="#0d1422" stroke="#33455f"/>
  <text x="100" y="520" fill="#9fb2ca" font-size="12">Net effect: one audit run simultaneously powers in-app guidance and editor-native remediation workflows.</text>
</svg>
