<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bgGrad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1419"/>
      <stop offset="100%" style="stop-color:#1a2332"/>
    </linearGradient>
    <filter id="shadow4">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-opacity="0.2"/>
    </filter>
  </defs>

  <rect width="1200" height="800" fill="url(#bgGrad4)" rx="12"/>

  <!-- Title -->
  <text x="600" y="40" text-anchor="middle" fill="#ffffff" font-size="22" font-weight="700">Inspector — Component Tree &amp; Selection</text>
  <text x="600" y="62" text-anchor="middle" fill="#8899aa" font-size="12">Tree building, relay, bidirectional selection sync, and live prop editing</text>

  <!-- === SECTION 1: Tree Build === -->
  <rect x="30" y="85" width="560" height="330" rx="10" fill="#0d1a25" stroke="#ff6b6b" stroke-width="0.8"/>
  <text x="50" y="110" fill="#ff9f7f" font-size="13" font-weight="700">TREE BUILD (Agent-side)</text>

  <!-- Trigger -->
  <rect x="50" y="125" width="230" height="40" rx="6" fill="#2d1a1a" stroke="#ff6b6b" stroke-width="0.8" filter="url(#shadow4)"/>
  <text x="165" y="140" text-anchor="middle" fill="#ff9f7f" font-size="10" font-weight="600">Triggers</text>
  <text x="165" y="155" text-anchor="middle" fill="#8899aa" font-size="9">connect | pollForTree | MutationObserver (800ms)</text>

  <!-- Arrow down -->
  <line x1="165" y1="165" x2="165" y2="180" stroke="#ff6b6b" stroke-width="1.5"/>
  <polygon points="160,180 170,180 165,187" fill="#ff6b6b"/>

  <!-- Hash check -->
  <polygon points="165,190 235,215 165,240 95,215" fill="#1a1525" stroke="#feca57" stroke-width="1"/>
  <text x="165" y="218" text-anchor="middle" fill="#feca57" font-size="9">structuralHash</text>
  <text x="165" y="230" text-anchor="middle" fill="#feca57" font-size="8">changed?</text>

  <!-- No path -->
  <line x1="235" y1="215" x2="280" y2="215" stroke="#667788" stroke-width="1"/>
  <text x="260" y="208" fill="#667788" font-size="8">no</text>
  <rect x="280" y="203" width="65" height="24" rx="4" fill="#1a2332" stroke="#667788" stroke-width="0.5"/>
  <text x="312" y="219" text-anchor="middle" fill="#667788" font-size="9">skip</text>

  <!-- Yes path -->
  <line x1="165" y1="240" x2="165" y2="260" stroke="#feca57" stroke-width="1.5"/>
  <text x="175" y="255" fill="#feca57" font-size="8">yes</text>

  <!-- Build steps -->
  <rect x="50" y="262" width="230" height="34" rx="5" fill="#2d1a1a" stroke="#ff6b6b" stroke-width="0.8"/>
  <text x="165" y="277" text-anchor="middle" fill="#ff9f7f" font-size="10" font-weight="500">buildComponentTree</text>
  <text x="165" y="290" text-anchor="middle" fill="#667788" font-size="8">scan elements (cap 500)</text>

  <line x1="165" y1="296" x2="165" y2="308" stroke="#ff6b6b" stroke-width="1"/>

  <rect x="50" y="308" width="230" height="34" rx="5" fill="#2d1a1a" stroke="#ff6b6b" stroke-width="0.8"/>
  <text x="165" y="323" text-anchor="middle" fill="#ff9f7f" font-size="10" font-weight="500">getAdapter per element</text>
  <text x="165" y="336" text-anchor="middle" fill="#667788" font-size="8">React | Vue | Svelte detection</text>

  <line x1="165" y1="342" x2="165" y2="354" stroke="#ff6b6b" stroke-width="1"/>

  <rect x="50" y="354" width="230" height="34" rx="5" fill="#2d1a1a" stroke="#ff6b6b" stroke-width="0.8"/>
  <text x="165" y="369" text-anchor="middle" fill="#ff9f7f" font-size="10" font-weight="500">buildTreeNode</text>
  <text x="165" y="382" text-anchor="middle" fill="#667788" font-size="8">name, props, source, bounds, a11y</text>

  <!-- Node detail box -->
  <rect x="310" y="262" width="260" height="130" rx="6" fill="#162029" stroke="#445566" stroke-width="0.5"/>
  <text x="330" y="280" fill="#8899aa" font-size="9" font-weight="600">Tree Node Shape:</text>
  <text x="330" y="297" fill="#667788" font-size="9">• id (elementToId WeakMap)</text>
  <text x="330" y="312" fill="#667788" font-size="9">• name, props, children</text>
  <text x="330" y="327" fill="#667788" font-size="9">• source (file + line)</text>
  <text x="330" y="342" fill="#667788" font-size="9">• bounds (rect), layout (flex/grid)</text>
  <text x="330" y="357" fill="#667788" font-size="9">• a11yIssues[]</text>
  <text x="330" y="372" fill="#667788" font-size="9">• framework adapter ref</text>

  <!-- === SECTION 2: Tree Relay === -->
  <rect x="610" y="85" width="560" height="330" rx="10" fill="#0d1a25" stroke="#4ecdc4" stroke-width="0.8"/>
  <text x="630" y="110" fill="#7ae5dc" font-size="13" font-weight="700">TREE RELAY (Host → UI)</text>

  <!-- Relay pipeline -->
  <rect x="640" y="130" width="200" height="50" rx="6" fill="#0d2520" stroke="#4ecdc4" stroke-width="0.8" filter="url(#shadow4)"/>
  <text x="740" y="152" text-anchor="middle" fill="#7ae5dc" font-size="11" font-weight="600">agent:tree-update</text>
  <text x="740" y="168" text-anchor="middle" fill="#667788" font-size="9">from agent WebSocket</text>

  <line x1="740" y1="180" x2="740" y2="200" stroke="#4ecdc4" stroke-width="1.5"/>
  <polygon points="735,200 745,200 740,207" fill="#4ecdc4"/>

  <rect x="640" y="210" width="200" height="50" rx="6" fill="#0d2520" stroke="#4ecdc4" stroke-width="0.8"/>
  <text x="740" y="232" text-anchor="middle" fill="#7ae5dc" font-size="11" font-weight="600">handleAgentMessage</text>
  <text x="740" y="248" text-anchor="middle" fill="#667788" font-size="9">message-router.ts</text>

  <!-- Fork -->
  <line x1="740" y1="260" x2="740" y2="275" stroke="#4ecdc4" stroke-width="1"/>
  <line x1="680" y1="275" x2="800" y2="275" stroke="#4ecdc4" stroke-width="1"/>
  <line x1="680" y1="275" x2="680" y2="290" stroke="#4ecdc4" stroke-width="1"/>
  <line x1="800" y1="275" x2="800" y2="290" stroke="#4ecdc4" stroke-width="1"/>

  <!-- Branch 1: Sidebar -->
  <rect x="630" y="290" width="120" height="50" rx="6" fill="#162029" stroke="#4ecdc4" stroke-width="0.8"/>
  <text x="690" y="310" text-anchor="middle" fill="#7ae5dc" font-size="10" font-weight="500">Tree Provider</text>
  <text x="690" y="326" text-anchor="middle" fill="#667788" font-size="8">VS Code sidebar</text>

  <!-- Branch 2: Throttle -->
  <rect x="770" y="290" width="120" height="50" rx="6" fill="#162029" stroke="#4ecdc4" stroke-width="0.8"/>
  <text x="830" y="310" text-anchor="middle" fill="#7ae5dc" font-size="10" font-weight="500">Throttle</text>
  <text x="830" y="326" text-anchor="middle" fill="#667788" font-size="8">max 1/sec relay</text>

  <line x1="830" y1="340" x2="830" y2="360" stroke="#a29bfe" stroke-width="1.5"/>
  <polygon points="825,360 835,360 830,367" fill="#a29bfe"/>

  <!-- UI targets -->
  <rect x="770" y="370" width="180" height="30" rx="5" fill="#1a1530" stroke="#a29bfe" stroke-width="0.8"/>
  <text x="860" y="389" text-anchor="middle" fill="#c4b5fd" font-size="10">extension:tree → wci:tree → TreePanel</text>

  <!-- === SECTION 3: Selection Sync === -->
  <rect x="30" y="435" width="1140" height="155" rx="10" fill="#0d1a25" stroke="#feca57" stroke-width="0.8"/>
  <text x="50" y="460" fill="#feca57" font-size="13" font-weight="700">BIDIRECTIONAL SELECTION SYNC</text>

  <!-- DevTools → Browser -->
  <rect x="50" y="475" width="520" height="95" rx="8" fill="#162029" stroke="#00cec9" stroke-width="0.5"/>
  <text x="70" y="495" fill="#00e6a0" font-size="11" font-weight="600">DevTools → Browser</text>
  
  <rect x="70" y="505" width="100" height="28" rx="4" fill="#1a1530" stroke="#a29bfe" stroke-width="0.5"/>
  <text x="120" y="523" text-anchor="middle" fill="#c4b5fd" font-size="9">TreeNode UI</text>
  <text x="180" y="523" fill="#4ecdc4" font-size="9">→ host:highlight-component →</text>
  <rect x="360" y="505" width="120" height="28" rx="4" fill="#2d1a1a" stroke="#ff6b6b" stroke-width="0.5"/>
  <text x="420" y="523" text-anchor="middle" fill="#ff9f7f" font-size="9">highlight overlay</text>

  <rect x="70" y="540" width="100" height="28" rx="4" fill="#1a1530" stroke="#a29bfe" stroke-width="0.5"/>
  <text x="120" y="558" text-anchor="middle" fill="#c4b5fd" font-size="9">Click node</text>
  <text x="180" y="558" fill="#4ecdc4" font-size="9">→ host:select-component →</text>
  <rect x="360" y="540" width="120" height="28" rx="4" fill="#2d1a1a" stroke="#ff6b6b" stroke-width="0.5"/>
  <text x="420" y="558" text-anchor="middle" fill="#ff9f7f" font-size="9">scroll + flash</text>

  <!-- Browser → DevTools -->
  <rect x="610" y="475" width="540" height="95" rx="8" fill="#162029" stroke="#ff9f7f" stroke-width="0.5"/>
  <text x="630" y="495" fill="#ff9f7f" font-size="11" font-weight="600">Browser → DevTools</text>
  
  <rect x="630" y="510" width="120" height="28" rx="4" fill="#2d1a1a" stroke="#ff6b6b" stroke-width="0.5"/>
  <text x="690" y="528" text-anchor="middle" fill="#ff9f7f" font-size="9">Select mode click</text>
  <text x="760" y="528" fill="#4ecdc4" font-size="9">→ agent:component-selected →</text>

  <rect x="950" y="505" width="180" height="55" rx="4" fill="#1a1530" stroke="#a29bfe" stroke-width="0.5"/>
  <text x="1040" y="523" text-anchor="middle" fill="#c4b5fd" font-size="9" font-weight="500">DetailPanel syncs:</text>
  <text x="1040" y="538" text-anchor="middle" fill="#8899aa" font-size="8">Props | Layout | Computed</text>
  <text x="1040" y="551" text-anchor="middle" fill="#8899aa" font-size="8">Source | Accessibility</text>

  <!-- === SECTION 4: Live Props === -->
  <rect x="30" y="610" width="1140" height="170" rx="10" fill="#0d1a25" stroke="#a29bfe" stroke-width="0.8"/>
  <text x="50" y="635" fill="#c4b5fd" font-size="13" font-weight="700">LIVE PROP EDITING</text>

  <!-- Flow -->
  <rect x="50" y="655" width="140" height="50" rx="6" fill="#1a1530" stroke="#a29bfe" stroke-width="0.8" filter="url(#shadow4)"/>
  <text x="120" y="676" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="600">PropsSection</text>
  <text x="120" y="692" text-anchor="middle" fill="#667788" font-size="8">edit value inline</text>

  <line x1="190" y1="680" x2="230" y2="680" stroke="#a29bfe" stroke-width="1.5"/>
  <polygon points="230,676 230,684 237,680" fill="#a29bfe"/>

  <rect x="240" y="655" width="140" height="50" rx="6" fill="#0d2520" stroke="#4ecdc4" stroke-width="0.8"/>
  <text x="310" y="676" text-anchor="middle" fill="#7ae5dc" font-size="10" font-weight="600">updateProp</text>
  <text x="310" y="692" text-anchor="middle" fill="#667788" font-size="8">nodeId, name, value</text>

  <line x1="380" y1="680" x2="420" y2="680" stroke="#4ecdc4" stroke-width="1.5"/>
  <polygon points="420,676 420,684 427,680" fill="#4ecdc4"/>

  <rect x="430" y="655" width="140" height="50" rx="6" fill="#2d1a1a" stroke="#ff6b6b" stroke-width="0.8"/>
  <text x="500" y="676" text-anchor="middle" fill="#ff9f7f" font-size="10" font-weight="600">host:update-prop</text>
  <text x="500" y="692" text-anchor="middle" fill="#667788" font-size="8">prop-edit.ts</text>

  <line x1="570" y1="680" x2="610" y2="680" stroke="#ff6b6b" stroke-width="1.5"/>
  <polygon points="610,676 610,684 617,680" fill="#ff6b6b"/>

  <!-- Framework handlers -->
  <rect x="620" y="645" width="540" height="120" rx="8" fill="#162029" stroke="#ff6b6b" stroke-width="0.5"/>
  <text x="640" y="665" fill="#ff9f7f" font-size="10" font-weight="600">Framework-specific mutation:</text>

  <rect x="640" y="678" width="155" height="36" rx="4" fill="#2d1a1a" stroke="#ff6b6b" stroke-width="0.5"/>
  <text x="717" y="694" text-anchor="middle" fill="#ff9f7f" font-size="9" font-weight="500">React</text>
  <text x="717" y="707" text-anchor="middle" fill="#667788" font-size="8">mutateFiber → forceUpdate</text>

  <rect x="810" y="678" width="155" height="36" rx="4" fill="#2d1a1a" stroke="#ff6b6b" stroke-width="0.5"/>
  <text x="887" y="694" text-anchor="middle" fill="#ff9f7f" font-size="9" font-weight="500">Vue</text>
  <text x="887" y="707" text-anchor="middle" fill="#667788" font-size="8">adapter.updateProp</text>

  <rect x="980" y="678" width="155" height="36" rx="4" fill="#2d1a1a" stroke="#ff6b6b" stroke-width="0.5"/>
  <text x="1057" y="694" text-anchor="middle" fill="#ff9f7f" font-size="9" font-weight="500">Svelte</text>
  <text x="1057" y="707" text-anchor="middle" fill="#667788" font-size="8">adapter.updateProp</text>

  <rect x="640" y="722" width="510" height="24" rx="4" fill="#1a1a1a" stroke="#667788" stroke-width="0.5"/>
  <text x="895" y="738" text-anchor="middle" fill="#667788" font-size="9">Fallback: tryDomFallback() for all frameworks if primary path fails</text>
</svg>