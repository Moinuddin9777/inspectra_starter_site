<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 620" font-family="Segoe UI, Arial, sans-serif">
  <rect width="1100" height="620" fill="#101826"/>
  <text x="550" y="42" text-anchor="middle" fill="#ffffff" font-size="26" font-weight="700">Breakpoint Resolution State Machine</text>
  <text x="550" y="66" text-anchor="middle" fill="#8ea0b8" font-size="13">Loaded-script fast path plus trap-breakpoint fallback path</text>

  <rect x="450" y="100" width="200" height="44" rx="8" fill="#162c2a" stroke="#46d4c8"/>
  <text x="550" y="128" text-anchor="middle" fill="#8ff2ea" font-size="12" font-weight="600">setFileBreakpoint(file,line)</text>

  <polygon points="550,170 650,210 550,250 450,210" fill="#2c2a18" stroke="#e5c15b"/>
  <text x="550" y="206" text-anchor="middle" fill="#ffe08c" font-size="11">Matching loaded</text>
  <text x="550" y="222" text-anchor="middle" fill="#ffe08c" font-size="11">script?</text>

  <rect x="120" y="290" width="380" height="220" rx="10" fill="#0d1422" stroke="#33455f"/>
  <text x="150" y="320" fill="#9fb2ca" font-size="13" font-weight="600">YES: direct resolution path</text>
  <text x="150" y="348" fill="#9fb2ca" font-size="12">1. resolveBreakpointEntry()</text>
  <text x="150" y="372" fill="#9fb2ca" font-size="12">2. originalToGenerated() via source maps</text>
  <text x="150" y="396" fill="#9fb2ca" font-size="12">3. getPossibleBreakpoints() snap to valid location</text>
  <text x="150" y="420" fill="#9fb2ca" font-size="12">4. Debugger.setBreakpoint() -> resolved</text>

  <rect x="600" y="290" width="380" height="260" rx="10" fill="#0d1422" stroke="#33455f"/>
  <text x="630" y="320" fill="#9fb2ca" font-size="13" font-weight="600">NO: trap fallback path</text>
  <text x="630" y="348" fill="#9fb2ca" font-size="12">1. setBreakpointByUrl(line 0) trap</text>
  <text x="630" y="372" fill="#9fb2ca" font-size="12">2. wait for script load / pause at trap</text>
  <text x="630" y="396" fill="#9fb2ca" font-size="12">3. handleTrapPause() resolves actual breakpoints</text>
  <text x="630" y="420" fill="#9fb2ca" font-size="12">4. always Debugger.resume() in finally block</text>
  <text x="630" y="444" fill="#9fb2ca" font-size="12">5. safety valve auto-resumes unexpected line 0 pauses</text>

  <line x1="500" y1="230" x2="310" y2="290" stroke="#7fc7ff" stroke-width="2"/>
  <polygon points="310,290 318,280 322,292" fill="#7fc7ff"/>
  <text x="410" y="255" fill="#7fc7ff" font-size="10">yes</text>

  <line x1="600" y1="230" x2="790" y2="290" stroke="#ffb36b" stroke-width="2"/>
  <polygon points="790,290 778,292 782,280" fill="#ffb36b"/>
  <text x="675" y="255" fill="#ffb36b" font-size="10">no</text>

  <rect x="340" y="530" width="420" height="50" rx="8" fill="#2e1f1f" stroke="#ff7d7d"/>
  <text x="550" y="560" text-anchor="middle" fill="#ffb0b0" font-size="12">Goal: avoid SSR hangs while still resolving breakpoints for late-loaded scripts.</text>
</svg>
