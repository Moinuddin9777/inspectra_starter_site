<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 560" font-family="Segoe UI, Arial, sans-serif">
  <rect width="1100" height="560" fill="#101826"/>
  <text x="550" y="42" text-anchor="middle" fill="#ffffff" font-size="26" font-weight="700">Performance Render Tracking</text>
  <text x="550" y="66" text-anchor="middle" fill="#8ea0b8" font-size="13">React commit instrumentation with periodic metric relay</text>

  <rect x="70" y="110" width="220" height="80" rx="8" fill="#24203a" stroke="#8f7bff"/>
  <text x="180" y="140" text-anchor="middle" fill="#c7bbff" font-size="14" font-weight="600">UI usePerformance</text>
  <text x="180" y="160" text-anchor="middle" fill="#9ba8ba" font-size="11">performanceStart/Stop</text>
  <text x="180" y="176" text-anchor="middle" fill="#9ba8ba" font-size="11">recording state + charts</text>

  <rect x="410" y="110" width="260" height="80" rx="8" fill="#162c2a" stroke="#46d4c8"/>
  <text x="540" y="140" text-anchor="middle" fill="#8ff2ea" font-size="14" font-weight="600">Extension Host</text>
  <text x="540" y="160" text-anchor="middle" fill="#9ba8ba" font-size="11">host:performance-start/stop</text>
  <text x="540" y="176" text-anchor="middle" fill="#9ba8ba" font-size="11">relay agent:performance</text>

  <rect x="790" y="100" width="250" height="100" rx="8" fill="#2e1f1f" stroke="#ff7d7d"/>
  <text x="915" y="135" text-anchor="middle" fill="#ffb0b0" font-size="14" font-weight="700">Agent performance.ts</text>
  <text x="915" y="157" text-anchor="middle" fill="#9ba8ba" font-size="11">patch React DevTools hook</text>
  <text x="915" y="175" text-anchor="middle" fill="#9ba8ba" font-size="11">onCommitFiberRoot instrumentation</text>

  <line x1="290" y1="150" x2="410" y2="150" stroke="#7fc7ff" stroke-width="2"/>
  <polygon points="410,150 399,144 399,156" fill="#7fc7ff"/>
  <line x1="670" y1="150" x2="790" y2="150" stroke="#7fc7ff" stroke-width="2"/>
  <polygon points="790,150 779,144 779,156" fill="#7fc7ff"/>

  <rect x="130" y="250" width="840" height="200" rx="10" fill="#0d1422" stroke="#33455f"/>
  <text x="160" y="282" fill="#9fb2ca" font-size="14" font-weight="600">Processing loops</text>
  <text x="160" y="312" fill="#9fb2ca" font-size="12">Loop A (every React commit): walk fiber tree, capture duration, infer trigger, detect wasted renders.</text>
  <text x="160" y="338" fill="#9fb2ca" font-size="12">Loop B (every 2000ms): batch metrics and events -> send agent:performance -> host -> UI.</text>
  <text x="160" y="364" fill="#9fb2ca" font-size="12">UI merge strategy: keyed by nodeId, timeline cap 100 points, KPIs refreshed only while recording.</text>

  <rect x="160" y="390" width="360" height="40" rx="6" fill="#2e1f1f" stroke="#ff7d7d"/>
  <text x="340" y="415" text-anchor="middle" fill="#ffb0b0" font-size="11">Agent metric payload: renders[], events[], summary</text>

  <rect x="550" y="390" width="380" height="40" rx="6" fill="#24203a" stroke="#8f7bff"/>
  <text x="740" y="415" text-anchor="middle" fill="#c7bbff" font-size="11">UI outputs: hotspots, commit timeline, wasted render insights</text>

  <rect x="70" y="480" width="960" height="55" rx="10" fill="#0d1422" stroke="#33455f"/>
  <text x="100" y="514" fill="#9fb2ca" font-size="12">Design intent: low overhead sampling with bounded timelines while preserving enough context for practical render debugging.</text>
</svg>
