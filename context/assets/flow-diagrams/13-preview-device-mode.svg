<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 560" font-family="Segoe UI, Arial, sans-serif">
  <rect width="1100" height="560" fill="#101826"/>
  <text x="550" y="42" text-anchor="middle" fill="#ffffff" font-size="26" font-weight="700">Preview Navigation and Device Mode</text>
  <text x="550" y="66" text-anchor="middle" fill="#8ea0b8" font-size="13">Proxy-safe URL routing plus viewport presets and DPR overrides</text>

  <rect x="70" y="110" width="220" height="80" rx="8" fill="#24203a" stroke="#8f7bff"/>
  <text x="180" y="140" text-anchor="middle" fill="#c7bbff" font-size="14" font-weight="600">Preview Input</text>
  <text x="180" y="160" text-anchor="middle" fill="#9ba8ba" font-size="11">URL entry / link click</text>
  <text x="180" y="176" text-anchor="middle" fill="#9ba8ba" font-size="11">back/forward stack</text>

  <polygon points="390,150 470,112 550,150 470,188" fill="#2c2a18" stroke="#e5c15b"/>
  <text x="470" y="146" text-anchor="middle" fill="#ffe08c" font-size="11">Local or</text>
  <text x="470" y="162" text-anchor="middle" fill="#ffe08c" font-size="11">External?</text>

  <rect x="640" y="105" width="220" height="70" rx="8" fill="#162c2a" stroke="#46d4c8"/>
  <text x="750" y="134" text-anchor="middle" fill="#8ff2ea" font-size="13" font-weight="600">Local Path</text>
  <text x="750" y="154" text-anchor="middle" fill="#9ba8ba" font-size="11">toProxyUrl(app -> proxy)</text>

  <rect x="640" y="185" width="220" height="70" rx="8" fill="#162c2a" stroke="#46d4c8"/>
  <text x="750" y="214" text-anchor="middle" fill="#8ff2ea" font-size="13" font-weight="600">External Path</text>
  <text x="750" y="234" text-anchor="middle" fill="#9ba8ba" font-size="11">proxyOrigin + /__ext__ route</text>

  <rect x="900" y="145" width="150" height="70" rx="8" fill="#2e1f1f" stroke="#ff7d7d"/>
  <text x="975" y="174" text-anchor="middle" fill="#ffb0b0" font-size="13" font-weight="600">iframe src</text>
  <text x="975" y="194" text-anchor="middle" fill="#9ba8ba" font-size="11">agent injected</text>

  <line x1="550" y1="134" x2="640" y2="130" stroke="#7fc7ff" stroke-width="2"/><polygon points="640,130 629,124 629,136" fill="#7fc7ff"/>
  <line x1="550" y1="166" x2="640" y2="220" stroke="#7fc7ff" stroke-width="2"/><polygon points="640,220 628,217 632,208" fill="#7fc7ff"/>
  <line x1="860" y1="140" x2="900" y2="170" stroke="#7fc7ff" stroke-width="2"/><polygon points="900,170 889,168 893,159" fill="#7fc7ff"/>
  <line x1="860" y1="220" x2="900" y2="190" stroke="#7fc7ff" stroke-width="2"/><polygon points="900,190 892,198 889,188" fill="#7fc7ff"/>

  <rect x="70" y="270" width="980" height="240" rx="10" fill="#0d1422" stroke="#33455f"/>
  <text x="100" y="302" fill="#9fb2ca" font-size="14" font-weight="600">Device Mode subsystem</text>
  <text x="100" y="330" fill="#9fb2ca" font-size="12">1. Choose preset from devices.ts (width, height, DPR, orientation).</text>
  <text x="100" y="356" fill="#9fb2ca" font-size="12">2. ViewportContainer applies CSS transform scale for fit-to-panel behavior.</text>
  <text x="100" y="382" fill="#9fb2ca" font-size="12">3. ResizeObserver recomputes scale when panel dimensions change.</text>
  <text x="100" y="408" fill="#9fb2ca" font-size="12">4. Optional same-origin devicePixelRatio override for rendering parity.</text>
  <text x="100" y="434" fill="#9fb2ca" font-size="12">5. Agent emits URL updates; usePreview updates nav stack (max history 30).</text>
  <text x="100" y="460" fill="#9fb2ca" font-size="12">6. window.__wci_previewUrl mirrors active preview URL for UI synchronization.</text>
</svg>
